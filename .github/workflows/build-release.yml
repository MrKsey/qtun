name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  # Windows builds
  build-windows-x86:
    runs-on: windows-latest
    env:
      RUSTFLAGS: "-Ctarget-feature=+crt-static"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (x86)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: i686-pc-windows-msvc

      - name: Build release (x86)
        run: |
          cargo build --release --target i686-pc-windows-msvc

      - name: Package release
        shell: pwsh
        run: |
          $version = (Select-String -Pattern '^version *= *"([^"]*)"$' -Path "Cargo.toml" | ForEach-Object { $_.Matches.Value }).split()[-1]
          $version = $version -replace '"'
          $pkgName = "qtun-v${version}.i686-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path "build/release"
          Compress-Archive -Path "target/i686-pc-windows-msvc/release/qtun-client.exe", "target/i686-pc-windows-msvc/release/qtun-server.exe" -DestinationPath "build/release/${pkgName}"
          $hash = (Get-FileHash -Path "build/release/${pkgName}" -Algorithm SHA256).Hash
          "${hash}  ${pkgName}" | Out-File -FilePath "build/release/${pkgName}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: build/release/*

  build-windows-x86_64:
    runs-on: windows-latest
    env:
      RUSTFLAGS: "-Ctarget-feature=+crt-static"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Build release (x86_64)
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Package release
        shell: pwsh
        run: |
          $version = (Select-String -Pattern '^version *= *"([^"]*)"$' -Path "Cargo.toml" | ForEach-Object { $_.Matches.Value }).split()[-1]
          $version = $version -replace '"'
          $pkgName = "qtun-v${version}.x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path "build/release"
          Compress-Archive -Path "target/x86_64-pc-windows-msvc/release/qtun-client.exe", "target/x86_64-pc-windows-msvc/release/qtun-server.exe" -DestinationPath "build/release/${pkgName}"
          $hash = (Get-FileHash -Path "build/release/${pkgName}" -Algorithm SHA256).Hash
          "${hash}  ${pkgName}" | Out-File -FilePath "build/release/${pkgName}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: build/release/*

  build-windows-arm:
    runs-on: windows-latest
    env:
      RUSTFLAGS: "-Ctarget-feature=+crt-static"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (ARM)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-pc-windows-msvc

      - name: Build release (ARM)
        run: |
          cargo build --release --target aarch64-pc-windows-msvc

      - name: Package release
        shell: pwsh
        run: |
          $version = (Select-String -Pattern '^version *= *"([^"]*)"$' -Path "Cargo.toml" | ForEach-Object { $_.Matches.Value }).split()[-1]
          $version = $version -replace '"'
          $pkgName = "qtun-v${version}.aarch64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path "build/release"
          Compress-Archive -Path "target/aarch64-pc-windows-msvc/release/qtun-client.exe", "target/aarch64-pc-windows-msvc/release/qtun-server.exe" -DestinationPath "build/release/${pkgName}"
          $hash = (Get-FileHash -Path "build/release/${pkgName}" -Algorithm SHA256).Hash
          "${hash}  ${pkgName}" | Out-File -FilePath "build/release/${pkgName}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm
          path: build/release/*

  # macOS builds
  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build release (x86_64)
        run: |
          cargo build --release --target x86_64-apple-darwin

      - name: Package release
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | awk '{print $3}' | sed 's/"//g')
          PKG_NAME="qtun-v${VERSION}.x86_64-apple-darwin.tar.xz"
          mkdir -p build/release
          cd target/x86_64-apple-darwin/release
          tar -cJf ../../../build/release/${PKG_NAME} qtun-client qtun-server
          cd ../../../build/release
          shasum -a 256 "${PKG_NAME}" > "${PKG_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: build/release/*

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (ARM64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release (ARM64)
        run: |
          cargo build --release --target aarch64-apple-darwin

      - name: Package release
        run: |
          VERSION=$(grep -E '^version' Cargo.toml | awk '{print $3}' | sed 's/"//g')
          PKG_NAME="qtun-v${VERSION}.aarch64-apple-darwin.tar.xz"
          mkdir -p build/release
          cd target/aarch64-apple-darwin/release
          tar -cJf ../../../build/release/${PKG_NAME} qtun-client qtun-server
          cd ../../../build/release
          shasum -a 256 "${PKG_NAME}" > "${PKG_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/release/*

  # Linux builds using cross
  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build release (i686)
        run: |
          cd build
          ./build-release -t i686-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86
          path: build/release/*

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build release (x86_64)
        run: |
          cd build
          ./build-release -t x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: build/release/*

  build-linux-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build release (ARM)
        run: |
          cd build
          ./build-release -t arm-unknown-linux-musleabihf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm
          path: build/release/*

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build release (ARM64)
        run: |
          cd build
          ./build-release -t aarch64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: build/release/*

  # Create GitHub Release
  create-release:
    needs:
      - build-windows-x86
      - build-windows-x86_64
      - build-windows-arm
      - build-macos-x86_64
      - build-macos-arm64
      - build-linux-x86
      - build-linux-x86_64
      - build-linux-arm
      - build-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec mv {} release-assets/ \;
          ls -la release-assets/

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: qtun ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
